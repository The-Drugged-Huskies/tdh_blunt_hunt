<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blunt Hunt v0.69 - Dogechain Edition</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"
        type="application/javascript"></script>
</head>

<body>

    <div id="nes-wrapper">
        <main id="game-container">
            <!-- Top Header (Leaderboard & Wallet) -->
            <header id="nes-header">
                <div id="header-left">
                    <button id="leaderboard-btn" class="btn-secondary header-btn"
                        aria-label="Open Leaderboard">LEADERBOARD</button>
                    <div id="timer-display" class="hidden">TIME: 60</div>
                </div>
                <div id="wallet-container">
                    <button id="connect-wallet-btn" class="btn-wallet" aria-label="Connect Wallet">CONNECT</button>
                    <!-- Popup Menu -->
                    <div id="wallet-popup" class="hidden">
                        <div id="popup-balance">0.00 DOGE</div>
                        <button id="disconnect-btn" class="btn-secondary">DISCONNECT</button>
                    </div>
                </div>
            </header>

            <!-- Background Layer -->
            <div id="game-background"></div>

            <!-- Canvas Layer -->
            <canvas id="gameCanvas" aria-label="Game Screen"></canvas>

            <!-- UI Layer -->
            <div id="ui-layer">
                <!-- Start Screen -->
                <section id="start-screen" class="overlay">
                    <h1 class="title">BLUNT HUNT</h1>
                    <p class="subtitle" style="font-size: calc(0.9rem - 2px);">DRUGGED HUSKIES EDITION</p>

                    <!-- Pot Display -->
                    <div id="pot-display"
                        style="color: #FFD700; font-size: 1.2rem; margin-bottom: 5px; text-shadow: 2px 2px #000;">
                        POT: 0.00
                    </div>
                    <div id="pot-timer" style="font-size: 0.7rem; color: #ccc; margin-bottom: 20px;">
                        NEXT PAYOUT: 00:00
                    </div>

                    <!-- Flow Buttons -->
                    <button id="start-connect-btn" class="btn-primary btn-connect-start" disabled>START GAME</button>
                    <button id="start-btn" class="btn-primary hidden" disabled>START GAME</button>

                    <button id="settings-btn" class="btn-secondary">SETTINGS</button>

                    <!-- Settings Popup -->
                    <div id="settings-popup" class="settings-popup hidden">
                        <div class="settings-title">AUDIO SETTINGS</div>
                        <div class="settings-row">
                            <span>MUSIC</span>
                            <div class="slide-container">
                                <input type="range" min="0" max="100" value="100" class="slider" id="music-volume"
                                    aria-label="Music Volume">
                            </div>
                        </div>
                        <div class="settings-row">
                            <span>EFFECTS</span>
                            <div class="slide-container">
                                <input type="range" min="0" max="100" value="100" class="slider" id="sfx-volume"
                                    aria-label="Effects Volume">
                            </div>
                        </div>
                        <div class="settings-row">
                            <span>KEY</span>
                            <select id="key-select" class="nes-select" aria-label="Musical Key">
                                <option value="F">F</option>
                                <option value="G" selected>G</option>
                                <option value="Ab">Ab</option>
                                <option value="A">A</option>
                                <option value="Bb">Bb</option>
                            </select>
                        </div>
                        <button id="close-settings-btn" class="btn-secondary small">CLOSE</button>
                    </div>
                </section>

                <!-- Leaderboard Screen -->
                <section id="leaderboard-screen" class="overlay hidden">
                    <h1 class="title" style="font-size: 2rem;">LEADERBOARD</h1>

                    <div id="leaderboard-tabs"
                        style="display: flex; gap: 10px; margin-bottom: 10px; justify-content: center;">
                        <button id="tab-hourly" class="btn-secondary small active-tab"
                            style="background: #209cee; color: white;">TOURNAMENT</button>
                        <button id="tab-alltime" class="btn-secondary small">ALL TIME</button>
                    </div>

                    <div id="leaderboard-list">
                        <div class="leaderboard-header">
                            <span>#</span><span>NAME</span><span>SCORE</span>
                        </div>
                        <div id="leaderboard-rows"></div>
                    </div>

                    <div id="leaderboard-controls"
                        style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px;">
                        <button id="prev-page-btn" class="nav-arrow" aria-label="Previous Page">&lt;</button>
                        <button id="close-leaderboard-btn" class="btn-secondary" style="margin-top: 0;">CLOSE</button>
                        <button id="next-page-btn" class="nav-arrow" aria-label="Next Page">&gt;</button>
                    </div>

                    <div id="leaderboard-hud">
                        <!-- Reserved -->
                    </div>
                </section>

                <!-- Game Over Screen -->
                <section id="game-over-screen" class="overlay hidden">
                    <h1 class="title">GAME OVER</h1>
                    <p class="subtitle">SCORE: <span id="final-score">0</span></p>

                    <div id="submit-score-container" class="hidden">
                        <p id="submit-status-text"
                            style="font-size: 0.8rem; margin-bottom: 15px; color: #83d313; display: none;">
                            NEW HIGH SCORE!
                        </p>
                        <button id="submit-score-btn" class="btn-primary">SUBMIT</button>
                        <button id="skip-submit-btn" class="btn-secondary">SKIP</button>
                    </div>

                    <div id="game-over-menu" class="hidden">
                        <button id="restart-btn" class="btn-primary">PLAY AGAIN</button>
                        <button id="exit-btn" class="btn-secondary">EXIT</button>
                    </div>
                </section>

                <!-- Pause Screen -->
                <section id="pause-screen" class="overlay hidden">
                    <h1 class="title">PAUSED</h1>
                    <p class="subtitle">CLICK TO RESUME</p>
                </section>

                <!-- Modal -->
                <div id="custom-modal" class="overlay hidden" style="z-index: 2000;">
                    <h1 id="modal-title" class="title" style="font-size: 1.5rem; margin-bottom: 20px;">NOTICE</h1>
                    <p id="modal-message" class="subtitle"
                        style="font-size: 0.8rem; text-transform: none; line-height: 1.5; margin-bottom: 30px; max-width: 80%;">
                        Message</p>
                    <div id="modal-buttons" style="display: flex; gap: 20px; justify-content: center; width: 100%;">
                        <button id="modal-ok-btn" class="btn-primary">OK</button>
                        <button id="modal-cancel-btn" class="btn-secondary hidden">CANCEL</button>
                    </div>
                </div>
            </div>

            <!-- NES HUD -->
            <div id="nes-hud" class="hidden">
                <div class="hud-section left">
                    <div class="hud-label">SCORE</div>
                    <div id="score">000000</div>
                </div>
                <div class="hud-section center">
                    <div class="hit-row">
                        <div class="hud-label">HIT</div>
                        <div id="hit-markers"></div>
                    </div>
                </div>
                <div class="hud-section right">
                    <div class="hud-label">ROUND</div>
                    <div id="round-display">R=1</div>
                </div>
            </div>
        </main>

        <footer id="footer">
            blunt hunt v.0.6 | <a id="faq-link" href="#" class="footer-link">faq</a> | <a href="#"
                class="footer-link">roadmap</a>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/sprite.js') }}"></script>
    <script src="{{ url_for('static', filename='js/wallet.js') }}"></script>
    <script src="{{ url_for('static', filename='js/audio.js') }}"></script>
    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>

</html>
