<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Signer Debugger</title>
    <style>
        body {
            font-family: monospace;
            background: #222;
            color: #0f0;
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #0f0;
            color: #000;
            border: none;
            font-weight: bold;
        }

        #log {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #444;
            background: #000;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <h1>后端 SIGNER DEBUGGER</h1>
    <p>Click "TEST BACKEND SIGNER" to send a dummy request to your Vercel backend.</p>
    <p>If the backend is configured correctly (Env Var set), it will return a signature.</p>

    <button id="testBtn">TEST BACKEND SIGNER</button>
    <div id="log">Logs will appear here...</div>
    <script src="js/config.js"></script>

    <script>
        const logDiv = document.getElementById('log');
        function log(msg) {
            logDiv.innerText = msg + "\n\n" + logDiv.innerText;
        }

        document.getElementById('testBtn').onclick = async () => {
            log("Sending request to /api/sign-score...");

            try {
                // Dummy Data
                const payload = {
                    player: "0x1234567890123456789012345678901234567890",
                    score: 123,
                    contract: GameConfig.LEADERBOARD_CONTRACT_ADDRESS
                };

                const res = await fetch('/api/sign-score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (data.success) {
                    log("SUCCESS! \nSignature received: " + data.signature);
                    log("Backend is working correctly.");
                } else {
                    log("FAILURE! \nError: " + data.error);
                    if (data.error === "Signer not configured") {
                        log("DIAGNOSIS: Vercel Environment Variable 'SIGNER_PRIVATE_KEY' is missing or not loading.");
                    }
                }

            } catch (e) {
                log("NETWORK ERROR: " + e.message);
            }
        };
    </script>
</body>

</html>
